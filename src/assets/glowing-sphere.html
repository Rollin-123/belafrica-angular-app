<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing 3D Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            animation: fadeIn 2s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="title">Belafrica</div>
        <div class="info">Move your mouse to interact</div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x0a0a0f, 1);
        container.appendChild(renderer.domElement);
        
        // Create glowing sphere
        const sphereGeometry = new THREE.SphereGeometry(1.5, 64, 64);
        
        // Custom shader material for glow effect
        const glowMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                mouseX: { value: 0 },
                mouseY: { value: 0 }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                uniform float time;
                uniform float mouseX;
                uniform float mouseY;
                
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = position;
                    
                    // Subtle vertex displacement based on time and mouse
                    vec3 pos = position;
                    float displacement = sin(pos.x * 3.0 + time) * cos(pos.y * 3.0 + time) * 0.02;
                    pos += normal * displacement;
                    
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                uniform float time;
                uniform float mouseX;
                uniform float mouseY;
                
                void main() {
                    // Base color - cyan/blue gradient
                    vec3 baseColor = vec3(0.0, 0.7, 1.0);
                    vec3 accentColor = vec3(0.3, 0.0, 1.0);
                    
                    // Fresnel effect for edge glow
                    vec3 viewDirection = normalize(cameraPosition - vPosition);
                    float fresnel = pow(1.0 - dot(vNormal, viewDirection), 2.0);
                    
                    // Animated color based on position and time
                    float colorShift = sin(vPosition.y * 2.0 + time * 0.5) * 0.5 + 0.5;
                    vec3 finalColor = mix(baseColor, accentColor, colorShift);
                    
                    // Add fresnel glow
                    finalColor += vec3(0.2, 0.5, 1.0) * fresnel * 1.5;
                    
                    // Pulsing effect
                    float pulse = sin(time * 2.0) * 0.1 + 0.9;
                    finalColor *= pulse;
                    
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `,
            side: THREE.FrontSide
        });
        
        const sphere = new THREE.Mesh(sphereGeometry, glowMaterial);
        scene.add(sphere);
        
        // Outer glow sphere
        const glowGeometry = new THREE.SphereGeometry(1.8, 64, 64);
        const glowOuterMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                uniform float time;
                void main() {
                    vec3 viewDirection = normalize(cameraPosition);
                    float intensity = pow(0.7 - dot(vNormal, viewDirection), 2.0);
                    vec3 glowColor = vec3(0.0, 0.8, 1.0);
                    float pulse = sin(time * 1.5) * 0.2 + 0.8;
                    gl_FragColor = vec4(glowColor, intensity * 0.4 * pulse);
                }
            `,
            side: THREE.BackSide,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const glowOuter = new THREE.Mesh(glowGeometry, glowOuterMaterial);
        scene.add(glowOuter);
        
        // Add ambient light
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        // Add point lights
        const pointLight1 = new THREE.PointLight(0x00ccff, 1, 100);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xff00ff, 0.8, 100);
        pointLight2.position.set(-5, -5, 5);
        scene.add(pointLight2);
        
        // Particle system for background
        const particlesGeometry = new THREE.BufferGeometry();
        const particleCount = 500;
        const positions = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 20;
            positions[i + 1] = (Math.random() - 0.5) * 20;
            positions[i + 2] = (Math.random() - 0.5) * 20;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            color: 0x00ccff,
            size: 0.02,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
        
        // Mouse tracking
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Update shader uniforms for color shift based on mouse
            glowMaterial.uniforms.mouseX.value = mouseX;
            glowMaterial.uniforms.mouseY.value = mouseY;
        });
        
        // Touch support for mobile
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        });
        
        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Animation loop
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Update shader time uniforms
            glowMaterial.uniforms.time.value = time;
            glowOuterMaterial.uniforms.time.value = time;
            
            // Smooth mouse follow
            targetRotationX = mouseY * 0.5;
            targetRotationY = mouseX * 0.5;
            
            // Rotate sphere
            sphere.rotation.x += 0.005 + (targetRotationX - sphere.rotation.x) * 0.05;
            sphere.rotation.y += 0.008 + (targetRotationY - sphere.rotation.y) * 0.05;
            
            // Rotate glow outer (slightly different speed)
            glowOuter.rotation.x = sphere.rotation.x * 0.8;
            glowOuter.rotation.y = sphere.rotation.y * 0.8;
            
            // Rotate particles slowly
            particles.rotation.y += 0.0005;
            particles.rotation.x += 0.0002;
            
            // Move lights based on mouse position
            pointLight1.position.x = 5 + mouseX * 3;
            pointLight1.position.y = 5 + mouseY * 3;
            pointLight2.position.x = -5 - mouseX * 3;
            pointLight2.position.y = -5 - mouseY * 3;
            
            // Subtle camera movement
            camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.02;
            camera.position.y += (mouseY * 0.5 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
