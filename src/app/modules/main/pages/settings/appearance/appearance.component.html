<div class="bel-settings-page">
  <div class="bel-settings-header">
    <button class="bel-btn-back" (click)="goBackToSettings()">
      <span class="material-icons">arrow_back</span>
    </button>
    <h1>Apparence</h1>
  </div>
  <div class="bel-settings-body">

    <div class="bel-card bel-section">
      <h2 class="bel-section-title">Thème</h2>
      <div class="bel-theme-grid">
        <div *ngFor="let theme of themes"
          class="bel-theme-option"
          [class.active]="selectedTheme === theme.value"
          (click)="onThemeChange(theme.value)">
          <span class="material-icons">{{ theme.icon }}</span>
          <span>{{ theme.label }}</span>
        </div>
      </div>
    </div>

    <div class="bel-card bel-section">
      <h2 class="bel-section-title">Taille de police</h2>
      <div class="bel-font-grid">
        <div *ngFor="let fs of fontSizes"
          class="bel-font-option"
          [class.active]="selectedFontSize === fs.value"
          (click)="onFontSizeChange(fs.value)"
          [style.fontSize]="fs.value === 'small' ? '0.85rem' : fs.value === 'large' ? '1.15rem' : '1rem'">
          <span class="bel-font-preview">{{ fs.preview }}</span>
          <span>{{ fs.label }}</span>
        </div>
      </div>
    </div>

  </div>
</div>
