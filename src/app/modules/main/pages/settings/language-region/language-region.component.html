<div class="bel-settings-page">
  <div class="bel-settings-header">
    <button class="bel-btn-back" (click)="goBackToSettings()">
      <span class="material-icons">arrow_back</span>
    </button>
    <h1>Langue & Région</h1>
  </div>
  <div class="bel-settings-body">

    <div class="bel-card bel-section">
      <h2 class="bel-section-title">Langue d'affichage</h2>
      <div class="bel-language-list">
        <div *ngFor="let lang of languages"
          class="bel-list-item bel-selectable"
          [class.selected]="selectedLanguage === lang.code"
          (click)="onLanguageChange(lang.code)">
          <span class="bel-flag">{{ lang.flag }}</span>
          <div class="bel-list-item-info">
            <span class="bel-list-item-name">{{ lang.label }}</span>
            <span class="bel-list-item-sub">{{ lang.nativeLabel }}</span>
          </div>
          <span *ngIf="selectedLanguage === lang.code" class="material-icons bel-check">check_circle</span>
        </div>
      </div>
    </div>

    <div class="bel-card bel-section">
      <h2 class="bel-section-title">Région</h2>
      <select class="bel-select" [(ngModel)]="selectedRegion" (change)="onRegionChange(selectedRegion)">
        <option *ngFor="let region of regions" [value]="region.code">{{ region.label }}</option>
      </select>
    </div>

  </div>
</div>
