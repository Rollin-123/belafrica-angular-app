<!-- Layout Principal Style WhatsApp -->
<div class="bel-main-layout">

  <header class="bel-header">
    <div class="bel-header-content">
      <div class="bel-header-logo">
        <app-logo size="small"></app-logo>
      </div>

      <h1 class="bel-header-title">{{ getCurrentTitle() }}</h1>
      @if (showFabButton) {
        <button
          class="bel-fab"
          (click)="openCreatePostModal()"
          title="Créer une publication">
          ✏️
        </button>
      }

      @if (showCreatePostModal) {
        <app-create-post-modal
          (closed)="closeCreatePostModal()"
          (postCreated)="onPostCreated()">
        </app-create-post-modal>
      }
    </div>
  </header>

  <main class="bel-main-content">
    <router-outlet></router-outlet>
  </main>

  <nav class="bel-bottom-nav">
    <!-- National -->
    <button
      class="bel-nav-item"
      [class.active]="activeTab === 'national'"
      (click)="navigateTo('national')">
      <span class="bel-nav-icon">🏠</span>
      <span class="bel-nav-label">National</span>
    </button>

    <!-- International -->
    <button
      class="bel-nav-item"
      [class.active]="activeTab === 'international'"
      (click)="navigateTo('international')">
      <span class="bel-nav-icon">🌍</span>
      <span class="bel-nav-label">International</span>
    </button>

    <!-- Messages avec badge -->
    <button
      class="bel-nav-item"
      [class.active]="activeTab === 'messaging'"
      (click)="navigateTo('messaging')">
      <span class="bel-nav-icon-wrap">
        <span class="bel-nav-icon">💬</span>
        @if (unreadCount > 0) {
          <span class="bel-nav-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
        }
      </span>
      <span class="bel-nav-label">Messages</span>
    </button>

    <!-- Paramètres -->
    <button
      class="bel-nav-item"
      [class.active]="activeTab === 'settings'"
      (click)="navigateTo('settings')">
      <span class="bel-nav-icon">⚙️</span>
      <span class="bel-nav-label">Paramètres</span>
    </button>
  </nav>

</div>
